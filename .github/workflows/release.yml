name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  source:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          file_version="$(tr -d '\r\n' < VERSION)"
          version="$file_version"
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            version="${GITHUB_REF_NAME#v}"
          fi
          if [ "$version" != "$file_version" ]; then
            echo "Tag version $version does not match VERSION $file_version" >&2
            exit 1
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Check release version sync
        run: ./scripts/check-version-sync.sh

      - name: Create source archive
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.value }}"
          archive="sloc-${version}-source.tar.gz"
          git archive --format=tar.gz --prefix="sloc-${version}/" -o "$archive" HEAD

      - name: Upload source artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-source
          path: sloc-*-source.tar.gz

  binaries:
    needs: source
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-linux-musl
          - runner: ubuntu-latest
            target: aarch64-linux-musl
          - runner: macos-15-intel
            target: x86_64-macos
          - runner: macos-14
            target: aarch64-macos

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build release archive
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.source.outputs.version }}"
          target="${{ matrix.target }}"
          prefix="$RUNNER_TEMP/sloc-${version}-${target}"
          zig build -Doptimize=ReleaseFast -Dversion="$version" -Dtarget="$target" --prefix "$prefix"
          tar -C "$RUNNER_TEMP" -czf "sloc-${version}-${target}.tar.gz" "$(basename "$prefix")"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.target }}
          path: sloc-*.tar.gz

  publish:
    needs:
      - source
      - binaries
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          sha256sum dist/*.tar.gz | sort -k2 > dist/checksums.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*.tar.gz
            dist/checksums.txt
